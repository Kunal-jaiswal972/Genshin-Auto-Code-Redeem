services:
  redeemer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    env_file:
      - ../.env
    shm_size: "1gb"
    volumes:
      - redeemer-data:/data
    ports:
      # Bind to VM localhost only — reach via SSH tunnel (see README debug deploy).
      - "127.0.0.1:5900:5900"
    restart: unless-stopped

volumes:
  redeemer-data:
